name: Daily Cloudflare Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "10 23 * * *"

jobs:
  trigger:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}
    steps:
      - name: Trigger Cloudflare Pages deploy
        run: |
          if [ -z "$CLOUDFLARE_DEPLOY_HOOK" ]; then
            echo "CLOUDFLARE_DEPLOY_HOOK is not configured; skipping."
            exit 0
          fi
          curl --fail --show-error --silent --request POST "$CLOUDFLARE_DEPLOY_HOOK"

