name: Deploy Cloudflare Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "10 23 * * *"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare secrets
        id: cloudflare-secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured; skipping deploy."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        run: npm ci

      - name: Update data
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        run: npm run data:update

      - name: Build
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        if: steps.cloudflare-secrets.outputs.configured == 'true'
        run: npx wrangler pages deploy dist --project-name ipo-tracker-website --branch main

